# =============================
# Server
# =============================
server:
  port: ${PORT:8080}

spring:
  application:
    name: myfin-app

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/myfin_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:123456}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 20000

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
    clean-disabled: true

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        dialect:
          default_param_cast: true
    show-sql: false

  jackson:
    serialization:
      write-dates-as-timestamps: false

logging:
  level:
    root: INFO
    com.tafh.myfin_app: DEBUG
    org.springframework.web: INFO
    org.springframework.security: INFO

security:
  cookie:
    secure: ${SECURITY_COOKIE_SECURE:false}
    same-site: ${SECURITY_COOKIE_SAME_SITE:Strict}

jwt:
  secret: ${JWT_SECRET:SUPER_SECRET_KEY_MIN_32_CHARACTERS_LONG}
  issuer: ${JWT_ISSUER:myfin-app}
  expiration: ${JWT_EXPIRATION:60000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:2592000000}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}
